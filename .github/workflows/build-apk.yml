name: Build FitTrack APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

       - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Patch AndroidManifest.xml
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<application|<uses-permission android:name="android.permission.ACTIVITY_RECOGNITION"/>\n    <uses-permission android:name="com.google.android.gms.permission.ACTIVITY_RECOGNITION"/>\n\n    <application|' "$FILE"
          echo "=== AndroidManifest.xml permissions ==="
          grep -A1 "ACTIVITY" "$FILE" || echo "WARNING: permission not found"

      - name: Patch MainActivity.java
        run: |
          FILE="android/app/src/main/java/com/fittrack/app/MainActivity.java"
          echo "=== Writing MainActivity.java ==="
          printf 'package com.fittrack.app;\n\nimport android.os.Bundle;\nimport com.getcapacitor.BridgeActivity;\nimport io.capgo.capgopedomter.CapacitorPedometer;\n\npublic class MainActivity extends BridgeActivity {\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n        registerPlugin(CapacitorPedometer.class);\n        super.onCreate(savedInstanceState);\n    }\n}\n' > "$FILE"
          echo "=== MainActivity.java contents ==="
          cat "$FILE"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Show Android SDK info
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          ls "$ANDROID_HOME/platforms/" || true

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --warning-mode all 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitTrack-debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Done
        run: |
          echo "✅ Build complete!"
          ls -lh android/app/build/outputs/apk/debug/
